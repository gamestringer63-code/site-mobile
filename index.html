<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="box">
        <div class="list">
            <ul>
                <li class="op op1"><a href="#home">
                    <i class="fa-solid fa-house"></i>
                </a></li>
                <li class="op op2"><a href="#information">
                    <i class="fa-solid fa-circle-info"></i>
                </a></li>
                <li class="op op3"><a href="#cursos">
                    <i class="fa-solid fa-graduation-cap"></i>
                </a></li>
                <li class="op op4"><a href="#inscrition">
                    <i class="fa-solid fa-user-plus"></i>
                </a></li>
                <li class="op op5"><a href="#contato">
                    <i class="fa-solid fa-phone"></i>
                </a></li>
            </ul>
        </div>
    </header>
    <main class="box">
        <section class="section home" id="home">
            <div class="title"></div>
            <div class="text">
                <h1 class="titulo">Aprenda Informática Do Zero ao Avançado.</h1>
                <p class="frase">Cursos de informática, pacote Office e Windows</p>
                <form action="">
                    <a class="btn curso" href="">Ver cursos</a>
                    <a class="btn cadastro" href="">Inscreva-se</a>
                </form>
            </div>
            <div class="base">
                <div class="beneficio">
                    <ul class="list-beneficio">
                        <li>
                            <aside>
                                <i class="fa-solid fa-award"></i>
                                <span>Certificado <br> Válido</span>
                            </aside>
                        </li>
                        <li>
                            <aside>
                                <i class="fa-solid fa-gear"></i>
                                <span>Aulas <br> Práticas</span>
                            </aside>
                        </li>
                        <li>
                            <aside>
                                <i class="fa-solid fa-user-tie"></i>
                                <span>Suporte <br> ao Aluno</span>
                            </aside>
                        </li>
                    </ul>
                </div>
            </div>
        </section>
        <section class="section information" id="information">SOBRE</section>
        <section class="section cursos" id="cursos">CURSOS</section>
        <section class="section inscrition" id="inscrition">INSCRIÇÃO</section>
        <section class="section contato" id="contato">CONTATO</section>
    </main>
    <footer class="box"></footer>
</body>
</html>
